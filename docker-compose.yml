version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: assistente_postgres_local
    environment:
      POSTGRES_USER: usuario
      POSTGRES_PASSWORD: senha
      POSTGRES_DB: assistente_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # NOVO: Serviço do Redis
  redis:
    image: redis:7-alpine
    container_name: assistente_redis_local
    ports:
      - "6379:6379"

volumes:
  postgres_data: